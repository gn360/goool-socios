# ─── Production — Nginx serving pre-built static SPA ───────────────

services:
  app:
    build:
      # Build context is workspace root so goool-sdk is accessible.
      # The Dockerfile resolves file:../goool-sdk → /goool-sdk via COPY.
      context: ..
      dockerfile: ./goool-socios/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.goool.uy/api}

    image: ${SOCIOS_IMAGE:-goool-socios:latest}
    container_name: goool-socios

    # Port bound to 127.0.0.1 only — Apache2 is the sole public entry point.
    ports:
      - "127.0.0.1:${SOCIOS_PROD_PORT:-8083}:80"

    networks:
      - goool_prod

    restart: always

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    deploy:
      resources:
        limits:
          cpus: "${SOCIOS_CPU_LIMIT:-0.5}"
          memory: "${SOCIOS_MEM_LIMIT:-128M}"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# Network is created by goool-infra/start-prod.sh
networks:
  goool_prod:
    external: true
