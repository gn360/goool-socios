# ─── Production — Nginx serving optimized static build ──────────────
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# The container is private — Apache2 Reverse Proxy forwards requests.
# No ports are exposed to the host.

services:
  socios:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${SOCIOS_IMAGE:-goool-socios:latest}
    container_name: goool-socios
    networks:
      - goool_prod
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "${SOCIOS_CPU_LIMIT:-0.5}"
          memory: "${SOCIOS_MEM_LIMIT:-128M}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  goool_prod:
    external: true
