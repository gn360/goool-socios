# ─── Development — Vite Dev Server with HMR ────────────────────────
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# Requirements:
#   - goool-api already running (shared network "goool")

services:
  socios:
    image: node:22-alpine
    container_name: goool-socios-dev
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://goool-api-nginx/api}
      VITE_APP_NAME: ${VITE_APP_NAME:-Goool Socios}
      VITE_APP_ENV: development
    networks:
      - goool
    restart: unless-stopped

networks:
  goool:
    external: true
