server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets with long-lived cache ──────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Deny hidden files ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
